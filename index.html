<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공용실 사용계획</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--bg-card:#fff;--bg-sidebar:#1b2433;--bg-sidebar-hover:#253044;
  --bg-sidebar-active:#2563eb;--text-primary:#1a1f2e;--text-secondary:#5a6478;
  --text-muted:#9aa0b0;--text-sidebar:#b8c4d8;--border:#e4e8f0;
  --blue:#2563eb;--blue-light:#eff6ff;--blue-dark:#1d4ed8;--blue-text:#1e40af;
  --red:#ef4444;--green:#22c55e;--radius:10px;--radius-sm:6px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111827;--bg-card:#1f2937;--bg-sidebar:#0f172a;--bg-sidebar-hover:#1e293b;
  --text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--border:#2d3748;
  --blue-light:#1e3a5f;--blue-text:#93c5fd;}
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);font-size:14px}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:196px;min-width:196px;background:var(--bg-sidebar);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{display:flex;align-items:center;gap:8px}
.logo i{font-size:20px;color:#60a5fa}
.logo-text span{display:block;font-size:13.5px;font-weight:600;color:#fff;line-height:1.3}
.logo-text small{font-size:11px;color:rgba(255,255,255,.35)}
.sidebar-body{flex:1;overflow-y:auto;padding:8px 7px}
.sidebar-body::-webkit-scrollbar{width:3px}
.sidebar-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.room-btn{width:100%;display:flex;align-items:center;gap:7px;padding:7px 9px;border:none;background:none;cursor:pointer;border-radius:var(--radius-sm);color:var(--text-sidebar);font-size:12.5px;text-align:left;transition:background .12s,color .12s;position:relative}
.room-btn:hover{background:var(--bg-sidebar-hover);color:#fff}
.room-btn.active{background:var(--bg-sidebar-active);color:#fff;font-weight:500}
.room-btn i{font-size:14px;opacity:.7;flex-shrink:0}
.room-btn.active i{opacity:1}
.room-dot{width:5px;height:5px;border-radius:50%;background:#60a5fa;position:absolute;right:9px;top:50%;transform:translateY(-50%);display:none}
.room-btn.has-today .room-dot{display:block}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:12px 18px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.topbar-left h1{font-size:15px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.today-badge{background:var(--blue-light);color:var(--blue-text);font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-status{display:flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.sync-status.connected{background:#f0fdf4;color:#15803d}
.sync-status.connecting{background:#fefce8;color:#92400e}
.sync-status.error{background:#fef2f2;color:#b91c1c}
.sync-status i{font-size:12px}
.add-btn{display:flex;align-items:center;gap:5px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s;white-space:nowrap}
.add-btn:hover{background:var(--blue-dark)}
.add-btn i{font-size:15px}
.content{display:flex;flex:1;overflow:hidden}
.cal-panel{width:256px;min-width:256px;border-right:1px solid var(--border);padding:16px 13px;overflow-y:auto;background:var(--bg-card)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav button{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:var(--bg)}
.cal-nav .mlabel{font-size:13.5px;font-weight:600;color:var(--text-primary)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.wday{text-align:center;font-size:10.5px;color:var(--text-muted);padding:3px 0;font-weight:500}
.cday{height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);position:relative;transition:background .1s}
.cday:hover:not(.empty){background:var(--bg)}
.cday.today{color:var(--blue);font-weight:700}
.cday.selected{background:var(--blue)!important;color:#fff!important;font-weight:600}
.cday.empty{cursor:default}
.cday.sun{color:#ef4444}.cday.sat{color:var(--blue)}
.cday.selected.sun,.cday.selected.sat{color:#fff!important}
.cdots{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);display:flex;gap:1.5px}
.cdot{width:3.5px;height:3.5px;border-radius:50%;background:var(--blue);opacity:.65}
.cday.selected .cdot{background:#fff;opacity:.9}
.sched-panel{flex:1;overflow-y:auto;padding:16px 18px;background:var(--bg)}
.sched-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.sched-title{font-size:14px;font-weight:600;color:var(--text-primary)}
.sched-cnt{font-size:11.5px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);padding:2px 9px;border-radius:20px}
.empty-state{text-align:center;padding:52px 16px;color:var(--text-muted)}
.empty-state i{font-size:34px;display:block;margin-bottom:9px;opacity:.28}
.empty-state p{font-size:13px}
.scard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px;border-left:3px solid var(--blue);animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.scard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.scard-user{font-size:13.5px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:5px}
.scard-user i{font-size:13px;color:var(--blue)}
.scard-purpose{font-size:12.5px;color:var(--text-secondary);margin-top:2px}
.scard-times{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.ttag{background:var(--blue-light);color:var(--blue-text);font-size:11.5px;padding:2px 9px;border-radius:20px;font-weight:500}
.scard-note{font-size:12px;color:var(--text-muted);margin-top:6px;display:flex;align-items:center;gap:4px}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:4px;display:flex;transition:color .12s}
.del-btn:hover{color:var(--red)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg-card);border-radius:var(--radius);width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.mhead{padding:16px 20px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-card);z-index:1}
.mhead h2{font-size:14.5px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:7px}
.mhead h2 i{color:var(--blue)}
.mclose{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:4px;display:flex}
.mclose:hover{color:var(--text-primary);background:var(--bg)}
.mbody{padding:18px 20px}
.frow{margin-bottom:13px}
.frow label{display:block;font-size:11.5px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.frow input,.frow select{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:13.5px;background:var(--bg-card);color:var(--text-primary);outline:none;transition:border-color .12s}
.frow input:focus,.frow select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.time-trigger{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-size:13.5px;background:var(--bg-card);color:var(--text-primary);cursor:pointer;text-align:left;display:flex;flex-wrap:wrap;gap:4px;min-height:38px;align-items:center;outline:none;transition:border-color .12s}
.time-trigger:focus,.time-trigger.open{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.time-trigger .ph{color:var(--text-muted);font-size:13.5px}
.tpopup{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);margin-top:4px;max-height:220px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.tpopup.open{display:block}
.topt{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .1s}
.topt:hover{background:var(--bg)}
.topt input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.topt label{font-size:13px;cursor:pointer;color:var(--text-primary);flex:1}
.topt.checked label{color:var(--blue);font-weight:500}
.mfoot{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg-card)}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text-secondary);transition:background .12s}
.btn-cancel:hover{background:var(--bg)}
.btn-save{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:5px}
.btn-save:hover:not(:disabled){background:var(--blue-dark)}
.btn-save:disabled{background:#93c5fd;cursor:not-allowed}
.btn-save i{font-size:15px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1f2e;color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:#7f1d1d}
.toast i{color:var(--green)}
.toast.err i{color:#fca5a5}
.loading-screen{position:fixed;inset:0;background:var(--bg-card);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-screen p{font-size:13px;color:var(--text-secondary)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){
  .sidebar{width:52px;min-width:52px}
  .logo-text,.room-btn span,.room-dot{display:none}
  .room-btn{justify-content:center;padding:10px 0}
  .room-btn i{font-size:18px}
  .sync-status span{display:none}
}
@media(max-width:520px){
  .content{flex-direction:column}
  .cal-panel{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <p>Firebase에 연결 중...</p>
</div>

<div class="layout">
  <nav class="sidebar" aria-label="공용실 목록">
    <div class="sidebar-header">
      <div class="logo">
        <i class="ti ti-building-community"></i>
        <div class="logo-text">
          <span>공용실 관리</span>
          <small>실시간 공유</small>
        </div>
      </div>
    </div>
    <div class="sidebar-body" id="roomList"></div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <i class="ti ti-door" style="font-size:18px;color:var(--blue)"></i>
        <h1 id="headerRoom">시청각실</h1>
        <span class="today-badge" id="todayBadge">오늘 0건</span>
      </div>
      <div class="topbar-right">
        <span class="sync-status connecting" id="syncStatus">
          <i class="ti ti-refresh"></i> <span>연결 중</span>
        </span>
        <button class="add-btn" onclick="openModal()">
          <i class="ti ti-plus"></i> 사용계획 추가
        </button>
      </div>
    </div>

    <div class="content">
      <div class="cal-panel">
        <div class="cal-nav">
          <button onclick="changeMonth(-1)" aria-label="이전 달"><i class="ti ti-chevron-left"></i></button>
          <span class="mlabel" id="calTitle"></span>
          <button onclick="changeMonth(1)" aria-label="다음 달"><i class="ti ti-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="sched-panel">
        <div class="sched-header">
          <div class="sched-title" id="schedTitle"></div>
          <span class="sched-cnt" id="schedCnt"></span>
        </div>
        <div id="schedList"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mTitle">
    <div class="mhead">
      <h2 id="mTitle"><i class="ti ti-calendar-plus"></i> 사용계획 입력</h2>
      <button class="mclose" onclick="closeModal()" aria-label="닫기"><i class="ti ti-x" style="font-size:18px"></i></button>
    </div>
    <div class="mbody">
      <div class="frow">
        <label for="f-room">공용실</label>
        <select id="f-room"></select>
      </div>
      <div class="frow">
        <label for="f-date">날짜</label>
        <input type="date" id="f-date">
      </div>
      <div class="frow">
        <label for="f-user">사용자 이름</label>
        <input type="text" id="f-user" placeholder="이름을 입력하세요">
      </div>
      <div class="frow">
        <label for="f-purpose">수업 / 용도</label>
        <input type="text" id="f-purpose" placeholder="예: 영어 수업, 동아리 활동, 회의">
      </div>
      <div class="frow">
        <label>사용 시간대 <span style="font-weight:400;color:var(--text-muted);text-transform:none;letter-spacing:0;font-size:11px">(중복 선택 가능)</span></label>
        <button type="button" class="time-trigger" id="timeTrigger" onclick="toggleTP()" aria-haspopup="listbox" aria-expanded="false">
          <span class="ph">시간대를 선택하세요</span>
        </button>
        <div class="tpopup" id="tpopup" role="listbox" aria-multiselectable="true"></div>
      </div>
      <div class="frow">
        <label for="f-note">비고</label>
        <input type="text" id="f-note" placeholder="추가 메모 (선택사항)">
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="saveBtn" onclick="saveSchedule()"><i class="ti ti-check"></i> 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite">
  <i class="ti ti-circle-check"></i>
  <span id="toastMsg"></span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAzX5JN4Mh3VtOzVMUKGXMqffvfASQrIa4",
  authDomain: "cnfl-schedule.firebaseapp.com",
  databaseURL: "https://cnfl-schedule-default-rtdb.firebaseio.com",
  projectId: "cnfl-schedule",
  storageBucket: "cnfl-schedule.firebasestorage.app",
  messagingSenderId: "767842831641",
  appId: "1:767842831641:web:447d8daac97af4e8e54988"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const schedulesRef = db.ref('schedules');

const ROOMS = [
  '비전홀','시청각실','소회의실','2층 외국어영재교실',
  '2층 영어카페','3층 중국어카페','3층 베트남어카페','4층 수학실',
  '3층 스팀실','4층 일본어카페','3층 소규모 1실','3층 소규모 2실',
  '3층 외국어교과실','2층 소규모 1실','2층 소규모 2실','2층 인문사회교실','4층 소강당',
  '4층 소규모 1실','4층 소규모 2실'
];
const ICONS = {
  '시청각실':'ti-device-tv','소회의실':'ti-users','비전홀':'ti-building',
  '2층 외국어영재교실':'ti-world','2층 영어카페':'ti-coffee','3층 중국어카페':'ti-coffee',
  '3층 베트남어카페':'ti-coffee','4층 수학실':'ti-math-function','3층 스팀실':'ti-flask',
  '4층 일본어카페':'ti-coffee','3층 소규모 1실':'ti-door','3층 소규모 2실':'ti-door',
  '3층 외국어교과실':'ti-language','2층 소규모 1실':'ti-door','2층 소규모 2실':'ti-door',
  '2층 인문사회교실':'ti-book','4층 소강당':'ti-armchair',
  '4층 소규모 1실':'ti-door','4층 소규모 2실':'ti-door'
};
const TIME_SLOTS = [
  '1교시','2교시','3교시','4교시','점심시간',
  '5교시','6교시','7교시','8교시','저녁시간','9교시','10교시'
];

let data = {};
let selRoom = ROOMS[0];
let viewDate = new Date();
let selDate = new Date();
let selTimes = [];
let tpOpen = false;
let firstLoad = true;

function dStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return dStr(new Date())}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function dataArr(){return Object.entries(data).map(([id,v])=>({id,...v}))}

// 연결 상태 감지
db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('syncStatus');
  if(snap.val()){
    el.className='sync-status connected';
    el.innerHTML='<i class="ti ti-cloud-check"></i> <span>실시간 연결됨</span>';
  } else {
    el.className='sync-status error';
    el.innerHTML='<i class="ti ti-cloud-off"></i> <span>연결 끊김</span>';
  }
});

// 실시간 데이터 수신
schedulesRef.on('value', snap => {
  data = snap.val() || {};
  if(firstLoad){
    firstLoad = false;
    document.getElementById('loadingScreen').style.display='none';
  }
  renderRooms(); renderCalendar(); renderSchedules();
}, err => {
  document.getElementById('loadingScreen').style.display='none';
  showToast('연결 오류: '+err.message, true);
});

function renderRooms(){
  const today=todayStr(), arr=dataArr();
  document.getElementById('roomList').innerHTML=ROOMS.map(r=>{
    const hasToday=arr.some(s=>s.room===r&&s.date===today);
    const ic=ICONS[r]||'ti-door';
    return `<button class="room-btn${r===selRoom?' active':''}${hasToday?' has-today':''}" onclick="selRm('${r.replace(/'/g,"\\'")}')">
      <i class="ti ${ic}"></i><span>${r}</span>${hasToday?'<div class="room-dot"></div>':''}
    </button>`;
  }).join('');
}

function selRm(r){
  selRoom=r;
  document.getElementById('headerRoom').textContent=r;
  renderRooms(); renderCalendar(); renderSchedules();
}

function renderCalendar(){
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  document.getElementById('calTitle').textContent=`${y}년 ${m+1}월`;
  const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  const today=new Date(), arr=dataArr();
  let html=['일','월','화','수','목','금','토'].map(d=>`<div class="wday">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="cday empty"></div>`;
  for(let d=1;d<=last;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
    const isS=selDate.getDate()===d&&selDate.getMonth()===m&&selDate.getFullYear()===y;
    const cnt=arr.filter(s=>s.room===selRoom&&s.date===ds).length;
    const dow=(first+d-1)%7;
    let cls='cday';
    if(dow===0)cls+=' sun'; if(dow===6)cls+=' sat';
    if(isT)cls+=' today'; if(isS)cls+=' selected';
    const dots=cnt>0?`<div class="cdots">${Array(Math.min(cnt,3)).fill('<div class="cdot"></div>').join('')}</div>`:'';
    html+=`<div class="${cls}" onclick="pickDate(${y},${m},${d})">${d}${dots}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  const tc=arr.filter(s=>s.room===selRoom&&s.date===todayStr()).length;
  document.getElementById('todayBadge').textContent=`오늘 ${tc}건`;
}

function pickDate(y,m,d){selDate=new Date(y,m,d);renderCalendar();renderSchedules();}
function changeMonth(dir){viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+dir,1);renderCalendar();}

function renderSchedules(){
  const ds=dStr(selDate);
  const wdays=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  document.getElementById('schedTitle').textContent=
    `${selDate.getFullYear()}년 ${selDate.getMonth()+1}월 ${selDate.getDate()}일 ${wdays[selDate.getDay()]}`;
  const items=dataArr().filter(s=>s.room===selRoom&&s.date===ds)
    .sort((a,b)=>TIME_SLOTS.indexOf(a.times[0]||'')-TIME_SLOTS.indexOf(b.times[0]||''));
  document.getElementById('schedCnt').textContent=`총 ${items.length}건`;
  if(!items.length){
    document.getElementById('schedList').innerHTML=
      `<div class="empty-state"><i class="ti ti-calendar-off"></i><p>이 날짜에 사용계획이 없습니다</p></div>`;
    return;
  }
  document.getElementById('schedList').innerHTML=items.map(s=>`
    <div class="scard">
      <div class="scard-top">
        <div>
          <div class="scard-user"><i class="ti ti-user"></i>${esc(s.user)}</div>
          <div class="scard-purpose">${esc(s.purpose)}</div>
        </div>
        <button class="del-btn" onclick="delItem('${s.id}')" aria-label="삭제"><i class="ti ti-trash" style="font-size:15px"></i></button>
      </div>
      <div class="scard-times">${s.times.map(t=>`<span class="ttag">${esc(t)}</span>`).join('')}</div>
      ${s.note?`<div class="scard-note"><i class="ti ti-notes" style="font-size:13px"></i>${esc(s.note)}</div>`:''}
    </div>`).join('');
}

function delItem(id){
  if(!confirm('이 사용계획을 삭제할까요?')) return;
  schedulesRef.child(id).remove()
    .then(()=>showToast('삭제되었습니다'))
    .catch(e=>showToast('삭제 실패: '+e.message,true));
}

function openModal(){
  selTimes=[];
  document.getElementById('f-room').innerHTML=ROOMS.map(r=>`<option value="${r}"${r===selRoom?' selected':''}>${r}</option>`).join('');
  document.getElementById('f-date').value=dStr(selDate);
  document.getElementById('f-user').value='';
  document.getElementById('f-purpose').value='';
  document.getElementById('f-note').value='';
  const btn=document.getElementById('saveBtn');
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-check"></i> 저장';
  buildTP(); updateTrigger();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-user').focus(),80);
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('tpopup').classList.remove('open');
  document.getElementById('timeTrigger').classList.remove('open');
  tpOpen=false;
}

function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function toggleTP(){
  tpOpen=!tpOpen;
  document.getElementById('tpopup').classList.toggle('open',tpOpen);
  document.getElementById('timeTrigger').classList.toggle('open',tpOpen);
  document.getElementById('timeTrigger').setAttribute('aria-expanded',tpOpen);
}

function buildTP(){
  document.getElementById('tpopup').innerHTML=TIME_SLOTS.map((t,i)=>`
    <div class="topt${selTimes.includes(t)?' checked':''}" role="option" aria-selected="${selTimes.includes(t)}">
      <input type="checkbox" id="ts${i}" ${selTimes.includes(t)?'checked':''} onchange="toggleT('${t}',this)">
      <label for="ts${i}">${t}</label>
    </div>`).join('');
}

function toggleT(t,cb){
  if(cb.checked){if(!selTimes.includes(t))selTimes.push(t);}
  else{selTimes=selTimes.filter(x=>x!==t);}
  selTimes.sort((a,b)=>TIME_SLOTS.indexOf(a)-TIME_SLOTS.indexOf(b));
  updateTrigger();
  cb.closest('.topt').classList.toggle('checked',cb.checked);
}

function updateTrigger(){
  document.getElementById('timeTrigger').innerHTML=selTimes.length
    ?selTimes.map(t=>`<span class="ttag">${t}</span>`).join('')
    :`<span class="ph">시간대를 선택하세요</span>`;
}

document.addEventListener('click',function(e){
  if(tpOpen&&!e.target.closest('.frow')){
    tpOpen=false;
    document.getElementById('tpopup').classList.remove('open');
    document.getElementById('timeTrigger').classList.remove('open');
  }
});

function saveSchedule(){
  const room=document.getElementById('f-room').value;
  const date=document.getElementById('f-date').value;
  const user=document.getElementById('f-user').value.trim();
  const purpose=document.getElementById('f-purpose').value.trim();
  const note=document.getElementById('f-note').value.trim();
  if(!date){alert('날짜를 선택해주세요.');return;}
  if(!user){alert('사용자 이름을 입력해주세요.');return;}
  if(!purpose){alert('수업/용도를 입력해주세요.');return;}
  if(!selTimes.length){alert('시간대를 하나 이상 선택해주세요.');return;}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader"></i> 저장 중...';
  schedulesRef.push({room,date,user,purpose,times:selTimes,note,createdAt:new Date().toISOString()})
    .then(()=>{
      const parts=date.split('-');
      selRoom=room;
      selDate=new Date(+parts[0],+parts[1]-1,+parts[2]);
      viewDate=new Date(+parts[0],+parts[1]-1,1);
      closeModal();
      document.getElementById('headerRoom').textContent=room;
      showToast('사용계획이 저장되었습니다');
    })
    .catch(e=>{
      btn.disabled=false;
      btn.innerHTML='<i class="ti ti-check"></i> 저장';
      showToast('저장 실패: '+e.message,true);
    });
}

function showToast(msg,isErr=false){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.className='toast'+(isErr?' err':'')+' show';
  t.querySelector('i').className=isErr?'ti ti-alert-circle':'ti ti-circle-check';
  setTimeout(()=>t.classList.remove('show'),3000);
}

renderRooms(); renderCalendar(); renderSchedules();
</script>
</body>
</html>
